<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#45f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0b0c10" />
  
  <!-- Outer Orbit -->
  <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="url(#grad1)" stroke-width="4" transform="rotate(45 50 50)" />
  
  <!-- Inner Orbit -->
  <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="url(#grad1)" stroke-width="4" transform="rotate(-45 50 50)" />
  
  <!-- Center Node -->
  <circle cx="50" cy="50" r="10" fill="url(#grad1)" />
</svg>
